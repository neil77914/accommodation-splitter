<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>住宿費用分攤</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #FFF8F2;
    --surface:   #FFFFFF;
    --border:    #F0DDD0;
    --accent:    #E07A3A;
    --accent-lt: #FFF1E8;
    --accent-dk: #C45E20;
    --success:   #4A9B6F;
    --warn:      #C4872A;
    --danger:    #C94040;
    --text:      #3A2A1E;
    --sub:       #9A7A68;
    --tag-bg:    #FDF0E8;
    --warm1:     #FDF6F0;
    --warm2:     #FAE8D8;
    --radius:    14px;
    --shadow:    0 2px 8px rgba(180,100,50,.08), 0 6px 20px rgba(180,100,50,.05);
    --font:      'Noto Sans TC', sans-serif;
    --mono:      'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: linear-gradient(135deg, #E8855A 0%, #D4603A 100%);
    color: #fff;
    padding: 32px 24px 26px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,.08);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 20px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,.06);
  }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: .04em; text-shadow: 0 1px 3px rgba(0,0,0,.15); }
  header p  { font-size: .88rem; opacity: .88; margin-top: 8px; letter-spacing: .02em; }

  .container { max-width: 680px; margin: 0 auto; padding: 0 16px; }

  section.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px 24px;
    margin-top: 20px;
  }
  section.card h2 {
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  section.card h2::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Form controls ── */
  .field-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .field-row label { font-size: .875rem; font-weight: 500; min-width: 110px; color: var(--text); }
  input[type=number], input[type=text] {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 11px;
    font-size: .9rem;
    font-family: var(--font);
    color: var(--text);
    background: var(--warm1);
    transition: border-color .15s, box-shadow .15s;
    outline: none;
  }
  input[type=number]:focus, input[type=text]:focus {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(224,122,58,.15);
  }
  .input-sm { width: 80px; }
  .input-md { width: 130px; }
  .hint { font-size: .78rem; color: var(--sub); line-height: 1.4; }

  /* ── 快速套用 chips ── */
  .coef-section-label {
    font-size: .8rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }
  .coef-section-label span {
    font-weight: 400;
    color: var(--sub);
    font-size: .76rem;
    margin-left: 6px;
  }
  .coef-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 0;
  }
  .chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: var(--tag-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: .78rem;
    cursor: pointer;
    transition: background .12s, border-color .12s, transform .1s, box-shadow .12s;
    user-select: none;
    color: var(--sub);
    min-width: 76px;
    text-align: center;
  }
  .chip:hover {
    background: var(--accent-lt);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 3px 8px rgba(224,122,58,.15);
  }
  .chip .chip-age  { font-size: .72rem; color: var(--sub); }
  .chip .chip-val  { font-family: var(--mono); font-weight: 700; font-size: 1rem; color: var(--accent); line-height: 1; }
  .chip .chip-desc { font-size: .68rem; color: #BBA090; margin-top: 1px; }

  /* ── Family table ── */
  .family-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 5px;
    margin-bottom: 4px;
  }
  .family-table thead th {
    font-size: .73rem;
    font-weight: 700;
    color: var(--sub);
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 4px 8px 10px;
    text-align: center;
    border-bottom: 1.5px solid var(--border);
  }
  .family-table thead th:first-child { text-align: left; padding-left: 4px; }
  .family-table tbody tr td {
    padding: 3px 5px;
    vertical-align: middle;
  }
  .family-table tbody tr td:first-child { padding-left: 2px; }
  .family-table tbody tr td input { width: 100%; }
  .family-table tbody tr td.td-del  { width: 32px; text-align: center; }
  .family-table tbody tr td.td-name { min-width: 90px; }
  .family-table tbody tr td.td-num  { width: 72px; }
  .family-table tbody tr td.td-coef { width: 82px; }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #CDB0A0;
    font-size: 1rem;
    line-height: 1;
    border-radius: 4px;
    padding: 3px 5px;
    transition: color .12s, background .12s;
  }
  .del-btn:hover { color: var(--danger); background: #FEE8E8; }

  .family-table tbody tr:nth-child(even) td input { background: var(--warm1); }
  .family-table tbody tr:nth-child(odd)  td input { background: #fff; }

  .add-btn {
    margin-top: 10px;
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    width: 100%;
    padding: 9px;
    font-size: .85rem;
    color: var(--sub);
    cursor: pointer;
    font-family: var(--font);
    transition: border-color .12s, color .12s, background .12s;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }

  .calc-btn {
    display: block;
    width: 100%;
    margin-top: 18px;
    background: linear-gradient(135deg, #E8855A, #D4603A);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    font-family: var(--font);
    cursor: pointer;
    letter-spacing: .06em;
    box-shadow: 0 3px 12px rgba(212,96,58,.3);
    transition: opacity .15s, transform .1s, box-shadow .15s;
  }
  .calc-btn:hover  { opacity: .92; box-shadow: 0 5px 16px rgba(212,96,58,.4); }
  .calc-btn:active { transform: scale(.98); }

  /* ── Result ── */
  #result { display: none; }
  .result-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .88rem;
  }
  .result-table th {
    background: var(--warm2);
    color: var(--accent-dk);
    font-weight: 700;
    font-size: .72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 9px 10px;
    text-align: right;
    border-bottom: 2px solid var(--accent);
  }
  .result-table th:first-child { text-align: left; }
  .result-table td {
    padding: 11px 10px;
    border-bottom: 1px solid var(--border);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .result-table td:first-child { text-align: left; font-weight: 600; }
  .result-table tr:last-child td { border-bottom: none; }
  .result-table tr:hover td { background: var(--warm1); }

  .amount-exact { color: var(--sub); font-family: var(--mono); font-size: .85rem; }
  .amount-round { font-family: var(--mono); font-weight: 700; color: var(--accent-dk); font-size: 1rem; }
  .diff-pos { color: var(--warn);    font-family: var(--mono); font-size: .8rem; }
  .diff-neg { color: var(--success); font-family: var(--mono); font-size: .8rem; }
  .diff-zer { color: var(--sub);     font-family: var(--mono); font-size: .8rem; }

  .summary-bar {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    background: linear-gradient(135deg, var(--accent-lt), var(--warm2));
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-top: 16px;
  }
  .summary-item { text-align: center; }
  .summary-item .s-label { font-size: .7rem; color: var(--sub); text-transform: uppercase; letter-spacing: .08em; }
  .summary-item .s-val   { font-family: var(--mono); font-weight: 700; font-size: 1.15rem; color: var(--accent-dk); display: block; margin-top: 3px; }

  .overage-note {
    margin-top: 10px;
    font-size: .8rem;
    color: var(--warn);
    text-align: center;
    padding: 8px;
    background: #FFF8EC;
    border-radius: 6px;
    border: 1px solid #F5DFA0;
  }

  .copy-btn {
    margin-top: 14px;
    background: var(--tag-bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: .85rem;
    font-family: var(--font);
    cursor: pointer;
    color: var(--text);
    transition: background .12s, border-color .12s;
    display: block;
    width: 100%;
    text-align: center;
  }
  .copy-btn:hover { background: var(--accent-lt); border-color: var(--accent); }

  footer {
    text-align: center;
    margin-top: 36px;
    font-size: .74rem;
    color: #C4A898;
  }

  @media (max-width: 500px) {
    .family-table tbody tr td.td-num  { width: 58px; }
    .family-table tbody tr td.td-coef { width: 66px; }
    header h1 { font-size: 1.3rem; }
    .chip { min-width: 64px; padding: 6px 10px; }
  }
</style>
</head>
<body>

<header>
  <h1>🏡 住宿費用分攤</h1>
  <p>依家庭人數與小孩係數，輕鬆算出每家應付金額</p>
</header>

<div class="container">

  <!-- 基本設定 -->
  <section class="card">
    <h2>🔧 基本設定</h2>

    <div class="field-row">
      <label>住宿總費用</label>
      <input type="number" id="total" class="input-md" value="27000" min="0" step="100">
      <span class="hint">元</span>
    </div>

    <!-- 係數快速套用 -->
    <div class="coef-section-label">
      小孩係數快速套用
      <span>點擊後同步更新所有家庭</span>
    </div>
    <div class="coef-chips" id="coef-chips"></div>
  </section>

  <!-- 家庭成員 -->
  <section class="card">
    <h2>👨‍👩‍👧‍👦 各家庭成員</h2>

    <table class="family-table" id="family-table">
      <thead>
        <tr>
          <th style="text-align:left">家庭名稱</th>
          <th>大人數</th>
          <th>小孩數</th>
          <th>小孩係數</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="family-tbody"></tbody>
    </table>

    <button class="add-btn" onclick="addFamily()">＋ 新增家庭</button>
    <button class="calc-btn" onclick="calculate()">✨ 計算分攤金額</button>
  </section>

  <!-- 結果 -->
  <section class="card" id="result">
    <h2>💰 分攤結果</h2>
    <table class="result-table">
      <thead>
        <tr>
          <th>家庭</th>
          <th>等效人頭</th>
          <th>精確金額</th>
          <th>建議收款</th>
          <th>差額</th>
        </tr>
      </thead>
      <tbody id="result-body"></tbody>
    </table>
    <div class="summary-bar" id="summary-bar"></div>
    <div class="overage-note" id="overage-note" style="display:none"></div>
    <button class="copy-btn" onclick="copyResult()">📋 複製文字摘要（貼到群組）</button>
  </section>

</div>

<footer>🏕️ 住宿費用分攤小工具 · 純前端運算，資料不上傳</footer>

<script>
const defaultFamilies = [
  { name:"A家", adults:2, children:2, coef:0.35 },
  { name:"B家", adults:2, children:2, coef:0.35 },
  { name:"C家", adults:1, children:1, coef:0.35 },
  { name:"D家", adults:2, children:2, coef:0.35 },
  { name:"E家", adults:2, children:2, coef:0.35 },
];

const coefOptions = [
  { age:"0–2 歲", val:0.00, desc:"嬰幼兒，不佔資源" },
  { age:"3–5 歲", val:0.20, desc:"共用大人床" },
  { age:"6–9 歲", val:0.35, desc:"標準小孩" },
  { age:"10–12", val:0.50, desc:"較大，佔較多資源" },
  { age:"13 歲+", val:0.75, desc:"接近大人需求" },
];

let familyCount = 0;

function init() {
  // 建立 chips
  const wrap = document.getElementById('coef-chips');
  coefOptions.forEach(opt => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.title = `點擊套用：所有家庭小孩係數 → ${opt.val.toFixed(2)}`;
    chip.innerHTML = `
      <span class="chip-age">${opt.age}</span>
      <span class="chip-val">${opt.val.toFixed(2)}</span>
      <span class="chip-desc">${opt.desc}</span>
    `;
    chip.onclick = () => {
      // 同步更新所有家庭的係數欄
      document.querySelectorAll('.coef-input').forEach(inp => {
        inp.value = opt.val.toFixed(2);
      });
      // 視覺回饋：短暫 highlight
      document.querySelectorAll('.chip').forEach(c => c.style.boxShadow = '');
      chip.style.boxShadow = '0 0 0 2px var(--accent)';
      setTimeout(() => chip.style.boxShadow = '', 800);
    };
    wrap.appendChild(chip);
  });

  defaultFamilies.forEach(f => addFamily(f));
}

function addFamily(preset = {}) {
  familyCount++;
  const id = familyCount;
  const coef = preset.coef ?? 0.35;
  const tbody = document.getElementById('family-tbody');
  const tr = document.createElement('tr');
  tr.id = `frow-${id}`;
  tr.innerHTML = `
    <td class="td-name">
      <input type="text" class="name-input" placeholder="家庭 ${id}" value="${preset.name || ''}">
    </td>
    <td class="td-num">
      <input type="number" class="adult-input" min="0" value="${preset.adults ?? 2}" style="text-align:center">
    </td>
    <td class="td-num">
      <input type="number" class="child-input" min="0" value="${preset.children ?? 0}" style="text-align:center">
    </td>
    <td class="td-coef">
      <input type="number" class="coef-input" min="0" max="1" step="0.05" value="${coef.toFixed(2)}" style="text-align:center">
    </td>
    <td class="td-del">
      <button class="del-btn" onclick="removeFamily(${id})" title="移除此家庭">✕</button>
    </td>
  `;
  tbody.appendChild(tr);
}

function removeFamily(id) {
  const el = document.getElementById(`frow-${id}`);
  if (el) el.remove();
}

function fmt(n) { return Math.round(n).toLocaleString('zh-TW'); }

function calculate() {
  const total = parseFloat(document.getElementById('total').value) || 0;
  const rows = document.querySelectorAll('#family-tbody tr');
  const families = [];

  rows.forEach(row => {
    const name     = row.querySelector('.name-input').value.trim() || '（未命名）';
    const adults   = parseInt(row.querySelector('.adult-input').value)  || 0;
    const children = parseInt(row.querySelector('.child-input').value)  || 0;
    const coef     = parseFloat(row.querySelector('.coef-input').value) || 0;
    const equiv    = adults + children * coef;
    families.push({ name, adults, children, coef, equiv });
  });

  const totalEquiv = families.reduce((s, f) => s + f.equiv, 0);
  if (totalEquiv === 0) { alert('請至少輸入一個家庭的人數！'); return; }

  const perUnit = total / totalEquiv;
  families.forEach(f => {
    f.exact = f.equiv * perUnit;
    f.round = Math.round(f.exact / 100) * 100;
    f.diff  = f.round - f.exact;
  });

  const totalRound = families.reduce((s, f) => s + f.round, 0);
  const overage = totalRound - total;

  const tbody = document.getElementById('result-body');
  tbody.innerHTML = '';
  families.forEach(f => {
    const diffClass = f.diff > 0.5 ? 'diff-pos' : f.diff < -0.5 ? 'diff-neg' : 'diff-zer';
    const diffStr   = f.diff > 0.5 ? `+${fmt(f.diff)}` : f.diff < -0.5 ? fmt(f.diff) : '—';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${f.name}</td>
      <td><span style="font-family:var(--mono);color:var(--sub)">${f.equiv.toFixed(2)}</span></td>
      <td class="amount-exact">${fmt(f.exact)}</td>
      <td class="amount-round">${fmt(f.round)}</td>
      <td class="${diffClass}">${diffStr}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-item">
      <span class="s-label">住宿總費用</span>
      <span class="s-val">$${fmt(total)}</span>
    </div>
    <div class="summary-item">
      <span class="s-label">等效人頭</span>
      <span class="s-val">${totalEquiv.toFixed(2)}</span>
    </div>
    <div class="summary-item">
      <span class="s-label">每人頭費用</span>
      <span class="s-val">$${perUnit.toFixed(1)}</span>
    </div>
    <div class="summary-item">
      <span class="s-label">收款合計</span>
      <span class="s-val" style="color:${Math.abs(overage)>50?'var(--warn)':'var(--success)'}">$${fmt(totalRound)}</span>
    </div>
  `;

  const note = document.getElementById('overage-note');
  if (Math.abs(overage) > 0) {
    const dir = overage > 0
      ? `多收 $${fmt(overage)}，可退給貢獻最多的家庭`
      : `少收 $${fmt(-overage)}，可由某家庭補差額`;
    note.textContent = `⚠️ 取整後 ${dir}`;
    note.style.display = 'block';
  } else {
    note.style.display = 'none';
  }

  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyResult() {
  const rows = document.querySelectorAll('#result-body tr');
  const total = document.getElementById('total').value;
  let text = `🏡 住宿費用分攤\n總費用：$${Number(total).toLocaleString('zh-TW')}\n${'─'.repeat(20)}\n`;
  rows.forEach(tr => {
    const cells = tr.querySelectorAll('td');
    text += `${cells[0].textContent.padEnd(6)}　$${cells[3].textContent}\n`;
  });
  text += `${'─'.repeat(20)}\n（金額已四捨五入至百元）`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ 已複製！貼到群組吧～';
    setTimeout(() => btn.textContent = '📋 複製文字摘要（貼到群組）', 2000);
  });
}

init();
</script>
</body>
</html>
