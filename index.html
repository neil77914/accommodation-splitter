<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>住宿費用分攤</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #FFF8F2;
    --surface:   #FFFFFF;
    --border:    #F0DDD0;
    --accent:    #E07A3A;
    --accent-lt: #FFF1E8;
    --accent-dk: #C45E20;
    --success:   #4A9B6F;
    --warn:      #C4872A;
    --danger:    #C94040;
    --text:      #3A2A1E;
    --sub:       #9A7A68;
    --tag-bg:    #FDF0E8;
    --warm1:     #FDF6F0;
    --warm2:     #FAE8D8;
    --radius:    14px;
    --shadow:    0 2px 8px rgba(180,100,50,.08), 0 6px 20px rgba(180,100,50,.05);
    --font:      'Noto Sans TC', sans-serif;
    --mono:      'DM Mono', monospace;
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 60px; }

  header {
    background: linear-gradient(135deg, #E8855A 0%, #D4603A 100%);
    color: #fff; padding: 32px 24px 26px; text-align: center;
    position: relative; overflow: hidden;
  }
  header::before { content:''; position:absolute; top:-30px; right:-30px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,.08); }
  header::after  { content:''; position:absolute; bottom:-20px; left:20px; width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,.06); }
  header h1 { font-size:1.6rem; font-weight:700; letter-spacing:.04em; text-shadow:0 1px 3px rgba(0,0,0,.15); }
  header p  { font-size:.88rem; opacity:.88; margin-top:8px; }

  .container { max-width: 680px; margin: 0 auto; padding: 0 16px; }

  section.card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 22px 24px; margin-top: 20px;
  }
  section.card h2 {
    font-size:.78rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--accent); margin-bottom:18px; display:flex; align-items:center; gap:8px;
  }
  section.card h2::after { content:''; flex:1; height:1px; background:var(--border); }

  .field-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .field-row label { font-size:.875rem; font-weight:500; min-width:110px; color:var(--text); }
  input[type=number], input[type=text] {
    border: 1.5px solid var(--border); border-radius:8px; padding:8px 11px;
    font-size:.9rem; font-family:var(--font); color:var(--text); background:var(--warm1);
    transition: border-color .15s, box-shadow .15s; outline:none;
  }
  input[type=number]:focus, input[type=text]:focus {
    border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px rgba(224,122,58,.15);
  }
  .input-md { width:130px; }
  .hint { font-size:.78rem; color:var(--sub); line-height:1.4; }

  /* ── Chips ── */
  .coef-section-label { font-size:.8rem; font-weight:600; color:var(--text); margin-bottom:10px; }
  .coef-section-label span { font-weight:400; color:var(--sub); font-size:.76rem; margin-left:6px; }
  .coef-chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip {
    display:flex; flex-direction:column; align-items:center; gap:2px;
    background:var(--tag-bg); border:1.5px solid var(--border); border-radius:10px;
    padding:8px 14px; font-size:.78rem; cursor:pointer;
    transition:background .12s, border-color .12s, transform .1s, box-shadow .12s;
    user-select:none; min-width:76px; text-align:center;
  }
  .chip:hover { background:var(--accent-lt); border-color:var(--accent); transform:translateY(-2px); box-shadow:0 3px 8px rgba(224,122,58,.15); }
  .chip .chip-age  { font-size:.72rem; color:var(--sub); }
  .chip .chip-val  { font-family:var(--mono); font-weight:700; font-size:1rem; color:var(--accent); line-height:1; }
  .chip .chip-desc { font-size:.68rem; color:#BBA090; margin-top:1px; }

  /* ── Family cards ── */
  .family-card {
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 10px; background: var(--warm1);
    transition: border-color .15s;
  }
  .family-card:focus-within { border-color: var(--accent); background: #fff; }

  .family-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .family-header input.name-input {
    font-size: 1rem; font-weight: 700; flex: 1;
    border: none; background: transparent; padding: 2px 4px;
    border-bottom: 1.5px solid var(--border);
    border-radius: 0; color: var(--text);
  }
  .family-header input.name-input:focus {
    border-bottom-color: var(--accent); box-shadow: none; background: transparent;
  }
  .family-del-btn {
    background: none; border: none; cursor: pointer; color: #CDB0A0;
    font-size: 1.1rem; padding: 2px 6px; border-radius: 4px;
    transition: color .12s, background .12s; flex-shrink: 0;
  }
  .family-del-btn:hover { color: var(--danger); background: #FEE8E8; }

  /* 大人列 */
  .adults-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .adults-row label { font-size:.82rem; color:var(--sub); min-width: 36px; }
  .adults-row input { width: 70px; text-align: center; }

  /* 小孩列 */
  .children-area { margin-bottom: 8px; }
  .children-label {
    font-size: .78rem; color: var(--sub); font-weight: 600;
    letter-spacing: .06em; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .child-rows { display: flex; flex-direction: column; gap: 5px; }
  .child-row {
    display: flex; align-items: center; gap: 8px;
  }
  .child-row .child-label { font-size:.8rem; color:var(--sub); min-width:42px; flex-shrink:0; }
  .child-row input.coef-input { width: 78px; text-align: center; flex-shrink:0; }
  .child-row .coef-hint {
    font-size:.72rem; color:#BBA090;
    flex-shrink: 1;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .child-del-btn {
    background: none; border: none; cursor: pointer; color: #CDB0A0;
    font-size: .9rem; padding: 2px 8px; border-radius: 4px;
    transition: color .12s, background .12s;
    flex-shrink: 0;
    margin-left: auto;
  }
  .child-del-btn:hover { color: var(--danger); background: #FEE8E8; }

  .add-child-btn {
    margin-top: 6px; background: none;
    border: 1px dashed var(--border); border-radius: 6px;
    padding: 5px 10px; font-size: .78rem; color: var(--sub);
    cursor: pointer; font-family: var(--font);
    transition: border-color .12s, color .12s;
    display: inline-block;
  }
  .add-child-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* no-children placeholder */
  .no-child-hint { font-size:.76rem; color:#CDB0A0; font-style:italic; padding: 2px 0; }

  .add-family-btn {
    margin-top: 4px; background: none;
    border: 1.5px dashed var(--border); border-radius: 8px;
    width: 100%; padding: 9px; font-size:.85rem; color:var(--sub);
    cursor: pointer; font-family: var(--font);
    transition: border-color .12s, color .12s, background .12s;
  }
  .add-family-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-lt); }

  .calc-btn {
    display:block; width:100%; margin-top:18px;
    background:linear-gradient(135deg,#E8855A,#D4603A); color:#fff;
    border:none; border-radius:10px; padding:14px; font-size:1rem;
    font-weight:700; font-family:var(--font); cursor:pointer; letter-spacing:.06em;
    box-shadow:0 3px 12px rgba(212,96,58,.3);
    transition:opacity .15s, transform .1s, box-shadow .15s;
  }
  .calc-btn:hover  { opacity:.92; box-shadow:0 5px 16px rgba(212,96,58,.4); }
  .calc-btn:active { transform:scale(.98); }

  /* ── Result ── */
  #result { display:none; }
  .result-table { width:100%; border-collapse:collapse; font-size:.88rem; }
  .result-table th {
    background:var(--warm2); color:var(--accent-dk); font-weight:700;
    font-size:.72rem; letter-spacing:.08em; text-transform:uppercase;
    padding:9px 10px; text-align:right; border-bottom:2px solid var(--accent);
  }
  .result-table th:first-child { text-align:left; }
  .result-table td {
    padding:11px 10px; border-bottom:1px solid var(--border);
    text-align:right; font-variant-numeric:tabular-nums;
  }
  .result-table td:first-child { text-align:left; font-weight:600; }
  .result-table tr:last-child td { border-bottom:none; }
  .result-table tr:hover td { background:var(--warm1); }
  .result-table .sub-info { font-size:.74rem; color:var(--sub); margin-top:2px; }

  .amount-exact { color:var(--sub); font-family:var(--mono); font-size:.85rem; }
  .amount-round { font-family:var(--mono); font-weight:700; color:var(--accent-dk); font-size:1rem; }
  .diff-pos { color:var(--warn);    font-family:var(--mono); font-size:.8rem; }
  .diff-neg { color:var(--success); font-family:var(--mono); font-size:.8rem; }
  .diff-zer { color:var(--sub);     font-family:var(--mono); font-size:.8rem; }

  .summary-bar {
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;
    background:linear-gradient(135deg,var(--accent-lt),var(--warm2));
    border:1px solid var(--border); border-radius:10px; padding:16px 20px; margin-top:16px;
  }
  .summary-item { text-align:center; }
  .summary-item .s-label { font-size:.7rem; color:var(--sub); text-transform:uppercase; letter-spacing:.08em; }
  .summary-item .s-val   { font-family:var(--mono); font-weight:700; font-size:1.15rem; color:var(--accent-dk); display:block; margin-top:3px; }

  .overage-note {
    margin-top:10px; font-size:.8rem; color:var(--warn); text-align:center;
    padding:8px; background:#FFF8EC; border-radius:6px; border:1px solid #F5DFA0;
  }
  .copy-btn {
    margin-top:14px; background:var(--tag-bg); border:1.5px solid var(--border);
    border-radius:8px; padding:10px 18px; font-size:.85rem; font-family:var(--font);
    cursor:pointer; color:var(--text); transition:background .12s, border-color .12s;
    display:block; width:100%; text-align:center;
  }
  .copy-btn:hover { background:var(--accent-lt); border-color:var(--accent); }

  footer { text-align:center; margin-top:36px; font-size:.74rem; color:#C4A898; }

  @media (max-width:500px) {
    header h1 { font-size:1.3rem; }
    .chip { min-width:64px; padding:6px 10px; }
  }
</style>
</head>
<body>

<header>
  <h1>🏡 住宿費用分攤</h1>
  <p>依家庭人數與每位小孩的係數，輕鬆算出每家應付金額</p>
</header>

<div class="container">

  <!-- 基本設定 -->
  <section class="card">
    <h2>🔧 基本設定</h2>
    <div class="field-row">
      <label>住宿總費用</label>
      <input type="number" id="total" class="input-md" value="27000" min="0" step="100">
      <span class="hint">元</span>
    </div>
    <div class="coef-section-label">
      小孩係數快速套用
      <span>點擊後套用至所選小孩的係數欄</span>
    </div>
    <div class="coef-chips" id="coef-chips"></div>
  </section>

  <!-- 家庭成員 -->
  <section class="card">
    <h2>👨‍👩‍👧‍👦 各家庭成員</h2>
    <div id="family-list"></div>
    <button class="add-family-btn" onclick="addFamily()">＋ 新增家庭</button>
    <button class="calc-btn" onclick="calculate()">✨ 計算分攤金額</button>
  </section>

  <!-- 結果 -->
  <section class="card" id="result">
    <h2>💰 分攤結果</h2>
    <table class="result-table">
      <thead>
        <tr>
          <th>家庭</th>
          <th>等效人頭</th>
          <th>精確金額</th>
          <th>建議收款</th>
          <th>差額</th>
        </tr>
      </thead>
      <tbody id="result-body"></tbody>
    </table>
    <div class="summary-bar" id="summary-bar"></div>
    <div class="overage-note" id="overage-note" style="display:none"></div>
    <button class="copy-btn" onclick="copyResult()">📋 複製文字摘要（貼到群組）</button>
  </section>

</div>

<footer>🏕️ 住宿費用分攤小工具 · 純前端運算，資料不上傳</footer>

<script>
const coefOptions = [
  { age:"0–2 歲", val:0.00, desc:"嬰幼兒，不佔資源" },
  { age:"3–5 歲", val:0.20, desc:"共用大人床" },
  { age:"6–9 歲", val:0.35, desc:"標準小孩" },
  { age:"10–12", val:0.50, desc:"佔較多資源" },
  { age:"13 歲+", val:0.75, desc:"接近大人需求" },
];

const defaultFamilies = [
  { name:"A家", adults:2, children:[0.35, 0.35] },
  { name:"B家", adults:2, children:[0.35, 0.35] },
  { name:"C家", adults:1, children:[0.35] },
  { name:"D家", adults:2, children:[0.35, 0.35] },
  { name:"E家", adults:2, children:[0.35, 0.35] },
];

let familyCount = 0;
let childCount  = 0;

// 目前「焦點中」的係數 input（點 chip 時套用到這格）
let focusedCoefInput = null;

function init() {
  // 建立 chips
  const wrap = document.getElementById('coef-chips');
  coefOptions.forEach(opt => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.title = `套用係數 ${opt.val.toFixed(2)} 到目前選取的小孩欄位`;
    chip.innerHTML = `
      <span class="chip-age">${opt.age}</span>
      <span class="chip-val">${opt.val.toFixed(2)}</span>
      <span class="chip-desc">${opt.desc}</span>
    `;
    chip.onclick = () => {
      if (focusedCoefInput) {
        focusedCoefInput.value = opt.val.toFixed(2);
        focusedCoefInput.focus();
        // 短暫 highlight
        focusedCoefInput.style.borderColor = 'var(--accent)';
        setTimeout(() => focusedCoefInput.style.borderColor = '', 800);
      } else {
        // 沒有焦點時，提示使用者先點一個小孩欄位
        chip.style.boxShadow = '0 0 0 2px var(--warn)';
        chip.title = '請先點選一個小孩的係數欄位！';
        setTimeout(() => { chip.style.boxShadow=''; chip.title=`套用係數 ${opt.val.toFixed(2)} 到目前選取的小孩欄位`; }, 1000);
      }
    };
    wrap.appendChild(chip);
  });

  defaultFamilies.forEach(f => addFamily(f));
}

function addFamily(preset = {}) {
  familyCount++;
  const fid = familyCount;
  const name = preset.name || `家庭${fid}`;
  const adults = preset.adults ?? 2;

  const container = document.getElementById('family-list');
  const card = document.createElement('div');
  card.className = 'family-card';
  card.id = `fcard-${fid}`;

  card.innerHTML = `
    <div class="family-header">
      <input type="text" class="name-input" value="${name}" placeholder="家庭名稱">
      <button class="family-del-btn" onclick="removeFamily(${fid})" title="移除此家庭">✕</button>
    </div>
    <div class="adults-row">
      <label>大人</label>
      <input type="number" class="adult-input" min="0" value="${adults}" style="text-align:center">
      <span class="hint">位</span>
    </div>
    <div class="children-area">
      <div class="children-label">小孩</div>
      <div class="child-rows" id="child-rows-${fid}"></div>
      <button class="add-child-btn" onclick="addChild(${fid})">＋ 新增小孩</button>
    </div>
  `;
  container.appendChild(card);

  // 加入預設小孩
  const childCoefs = preset.children || [];
  if (childCoefs.length === 0) {
    // 顯示提示
    const rows = card.querySelector(`#child-rows-${fid}`);
    const ph = document.createElement('div');
    ph.className = 'no-child-hint';
    ph.id = `no-child-${fid}`;
    ph.textContent = '（無小孩）';
    rows.appendChild(ph);
  } else {
    childCoefs.forEach(coef => addChild(fid, coef));
  }
}

function addChild(fid, coefVal) {
  childCount++;
  const cid = childCount;
  const coef = coefVal ?? 0.35;

  const rows = document.getElementById(`child-rows-${fid}`);

  // 移除「無小孩」提示
  const ph = document.getElementById(`no-child-${fid}`);
  if (ph) ph.remove();

  // 算第幾個小孩
  const idx = rows.querySelectorAll('.child-row').length + 1;

  const row = document.createElement('div');
  row.className = 'child-row';
  row.id = `crow-${cid}`;

  row.innerHTML = `
    <span class="child-label">小孩 ${idx}</span>
    <input type="number" class="coef-input" min="0" max="1" step="0.05"
           value="${coef.toFixed(2)}" style="text-align:center"
           title="此小孩的費用係數（相對於一位大人）">
    <span class="coef-hint">← 點上方年齡快速帶入</span>
    <button class="child-del-btn" title="移除此小孩">✕</button>
  `;

  // 刪除按鈕用 addEventListener，避免 inline onclick 找不到元素
  row.querySelector('.child-del-btn').addEventListener('click', () => removeChild(fid, cid));

  // 追蹤焦點
  const inp = row.querySelector('.coef-input');
  inp.addEventListener('focus', () => { focusedCoefInput = inp; });
  inp.addEventListener('blur',  () => { setTimeout(() => { if (focusedCoefInput === inp) focusedCoefInput = null; }, 200); });

  rows.appendChild(row);
}

function removeChild(fid, cid) {
  const row = document.getElementById(`crow-${cid}`);
  if (row) row.remove();

  // 更新小孩序號
  const rows = document.getElementById(`child-rows-${fid}`);
  const remaining = rows.querySelectorAll('.child-row');
  if (remaining.length === 0) {
    const ph = document.createElement('div');
    ph.className = 'no-child-hint';
    ph.id = `no-child-${fid}`;
    ph.textContent = '（無小孩）';
    rows.appendChild(ph);
  } else {
    remaining.forEach((r, i) => {
      const lbl = r.querySelector('.child-label');
      if (lbl) lbl.textContent = `小孩 ${i+1}`;
    });
  }
}

function removeFamily(fid) {
  const el = document.getElementById(`fcard-${fid}`);
  if (el) el.remove();
}

function fmt(n) { return Math.round(n).toLocaleString('zh-TW'); }

function calculate() {
  const total = parseFloat(document.getElementById('total').value) || 0;
  const cards = document.querySelectorAll('.family-card');
  const families = [];

  cards.forEach(card => {
    const name   = card.querySelector('.name-input').value.trim() || '（未命名）';
    const adults = parseInt(card.querySelector('.adult-input').value) || 0;
    const coefInputs = card.querySelectorAll('.coef-input');
    const childCoefs = Array.from(coefInputs).map(i => parseFloat(i.value) || 0);
    const childEquiv = childCoefs.reduce((s, c) => s + c, 0);
    const equiv = adults + childEquiv;
    families.push({ name, adults, childCoefs, equiv });
  });

  const totalEquiv = families.reduce((s, f) => s + f.equiv, 0);
  if (totalEquiv === 0) { alert('請至少輸入一個家庭的人數！'); return; }

  const perUnit = total / totalEquiv;
  families.forEach(f => {
    f.exact = f.equiv * perUnit;
    f.round = Math.round(f.exact / 100) * 100;
    f.diff  = f.round - f.exact;
  });

  const totalRound = families.reduce((s, f) => s + f.round, 0);
  const overage = totalRound - total;

  const tbody = document.getElementById('result-body');
  tbody.innerHTML = '';
  families.forEach(f => {
    const diffClass = f.diff > 0.5 ? 'diff-pos' : f.diff < -0.5 ? 'diff-neg' : 'diff-zer';
    const diffStr   = f.diff > 0.5 ? `+${fmt(f.diff)}` : f.diff < -0.5 ? fmt(f.diff) : '—';
    const childInfo = f.childCoefs.length > 0
      ? `大人×${f.adults}　小孩係數：${f.childCoefs.map(c=>c.toFixed(2)).join('、')}`
      : `大人×${f.adults}　無小孩`;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        ${f.name}
        <div class="sub-info">${childInfo}</div>
      </td>
      <td><span style="font-family:var(--mono);color:var(--sub)">${f.equiv.toFixed(2)}</span></td>
      <td class="amount-exact">${fmt(f.exact)}</td>
      <td class="amount-round">${fmt(f.round)}</td>
      <td class="${diffClass}">${diffStr}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-item">
      <span class="s-label">住宿總費用</span>
      <span class="s-val">$${fmt(total)}</span>
    </div>
    <div class="summary-item">
      <span class="s-label">等效人頭</span>
      <span class="s-val">${totalEquiv.toFixed(2)}</span>
    </div>
    <div class="summary-item">
      <span class="s-label">每人頭費用</span>
      <span class="s-val">$${perUnit.toFixed(1)}</span>
    </div>
    <div class="summary-item">
      <span class="s-label">收款合計</span>
      <span class="s-val" style="color:${Math.abs(overage)>50?'var(--warn)':'var(--success)'}">$${fmt(totalRound)}</span>
    </div>
  `;

  const note = document.getElementById('overage-note');
  if (Math.abs(overage) > 0) {
    const dir = overage > 0
      ? `多收 $${fmt(overage)}，可退給貢獻最多的家庭`
      : `少收 $${fmt(-overage)}，可由某家庭補差額`;
    note.textContent = `⚠️ 取整後 ${dir}`;
    note.style.display = 'block';
  } else {
    note.style.display = 'none';
  }

  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  resultEl.scrollIntoView({ behavior:'smooth', block:'start' });
}

function copyResult() {
  const rows = document.querySelectorAll('#result-body tr');
  const total = document.getElementById('total').value;
  let text = `🏡 住宿費用分攤\n總費用：$${Number(total).toLocaleString('zh-TW')}\n${'─'.repeat(20)}\n`;
  rows.forEach(tr => {
    const cells = tr.querySelectorAll('td');
    text += `${cells[0].querySelector('.sub-info') ? cells[0].firstChild.textContent.trim() : cells[0].textContent.trim()}　$${cells[3].textContent}\n`;
  });
  text += `${'─'.repeat(20)}\n（金額已四捨五入至百元）`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ 已複製！貼到群組吧～';
    setTimeout(() => btn.textContent = '📋 複製文字摘要（貼到群組）', 2000);
  });
}

init();
</script>
</body>
</html>
